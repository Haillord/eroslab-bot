name: ErosLab Wallpapers Bot

on:
  workflow_dispatch:

jobs:
  post_wallpapers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt


      - name: Run Wallpapers Bot
        env:
          TELEGRAM_BOT_TOKEN_WALLPAPERS: ${{ secrets.TELEGRAM_BOT_TOKEN_WALLPAPERS }}
          TELEGRAM_CHANNEL_ID_WALLPAPERS: ${{ secrets.TELEGRAM_CHANNEL_ID_WALLPAPERS }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
          STATS_TZ: "Europe/Moscow"
        run: python wallpapers_bot.py
        
      - name: Commit and push updates
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git pull origin main --no-rebase || true
          
          git add posted_ids_wallpapers.json posted_hashes_wallpapers.json stats_wallpapers.json content_state_wallpapers.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "📝 No changes to commit"
            exit 0
          fi
          
          git commit -m "📊 Update wallpapers history [skip ci]"
          
          for i in {1..3}; do
            if git push; then
              echo "✅ Successfully pushed"
              exit 0
            fi
            echo "Push failed, attempting pull and retry..."
            git pull origin main --no-rebase || true
            sleep 5
          done
          
          echo "❌ Failed to push after retries"
          exit 1