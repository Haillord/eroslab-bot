name: ErosLab News

on:
  schedule:
    - cron: '25 18 * * *'
  workflow_dispatch:

jobs:
  news-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Poster
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_PROVIDER: "auto"
          AI_TIMEOUT_SEC: "12"
          GROQ_MODEL: "llama-3.3-70b-versatile"
          OPENROUTER_MODEL: "openai/gpt-4o-mini"
          ENABLE_AI_NEWS: "true"
          NEWS_WATERMARK: "📣 @eroslabai"
          NEWS_LOOKBACK_HOURS: "96"
          NEWS_FETCH_LIMIT: "80"
          NEWS_MAX_PER_RUN: "1"
          NEWS_REQUIRE_IMAGE: "true"
          NEWS_MIN_IMAGE_WIDTH: "700"
          NEWS_MIN_IMAGE_HEIGHT: "390"
          NEWS_IMAGE_CHECK_TIMEOUT: "8"
          NEWS_MEDIA_MAX_IMAGES: "3"
          NEWS_MAX_REDDIT_STREAK: "1"
          STEAM_APP_IDS: ""
          NEWS_STATE_FILE: "news_state.json"
        run: python news_poster.py

      - name: Commit and push news state
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --no-rebase || true
          git add news_state.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update news state [skip ci]"

          for i in {1..3}; do
            if git push; then
              echo "Successfully pushed"
              exit 0
            fi
            echo "Push failed, retry..."
            git pull origin main --no-rebase || true
            sleep 5
          done

          echo "Failed to push after retries"
          exit 1
