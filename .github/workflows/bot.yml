name: ErosLab Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ←←← НОВЫЙ ШАГ: Лучшая установка yt-dlp для GitHub Actions
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: true        # автоматически установит ffmpeg + yt-dlp

      - name: Install ffmpeg (fallback)
        if: steps.setup-yt-dlp.outputs.ffmpeg != 'true'
        run: |
          sudo apt-get update --quiet
          sudo apt-get install -y ffmpeg --no-install-recommends

      - name: Run ErosLab Bot (CivitAI)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
          R34_API_KEY: ${{ secrets.R34_API_KEY }}
          R34_USER_ID: ${{ secrets.R34_USER_ID }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python civitai_bot.py
        
      - name: Commit and push updates
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Сначала делаем pull, чтобы получить последние изменения
          git pull origin main --no-rebase || true
          
          git add posted_ids.json posted_hashes.json stats.json apt-ffmpeg-version.txt content_state.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "📝 No changes to commit"
            exit 0
          fi
          
          git commit -m "📊 Update posted history [skip ci]"
          
          # Пробуем push с предварительным pull при конфликте
          for i in {1..3}; do
            if git push; then
              echo "✅ Successfully pushed"
              exit 0
            fi
            echo "Push failed, attempting pull and retry..."
            git pull origin main --no-rebase || true
            sleep 5
          done
          
          echo "❌ Failed to push after retries"
          exit 1
