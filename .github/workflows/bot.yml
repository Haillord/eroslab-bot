name: ErosLab Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
          
      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-ffmpeg-${{ hashFiles('**/apt-ffmpeg-version.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-ffmpeg-
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests Pillow python-telegram-bot feedparser
          
      - name: Install ffmpeg (with cache)
        run: |
          if command -v ffmpeg &> /dev/null; then
            echo "✅ ffmpeg already installed"
            ffmpeg -version | head -n1
            exit 0
          fi
          
          echo "📦 Installing ffmpeg..."
          sudo apt-get update --quiet
          sudo apt-get install -y ffmpeg --no-install-recommends
          
          # Сохраняем версию для кэша
          ffmpeg -version | head -n1 > apt-ffmpeg-version.txt

      - name: Run ErosLab Bot (CivitAI)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python civitai_bot.py
        
      - name: Commit and push updates (with retry)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Сохраняем изменения, чтобы избежать конфликтов
          git stash || true
          git pull --rebase --no-edit || true
          git stash pop || true
          
          # Добавляем файлы истории
          git add posted_ids.json posted_hashes.json stats.json apt-ffmpeg-version.txt 2>/dev/null || true
          
          # Проверяем, есть ли изменения
          if git diff --cached --quiet; then
            echo "📝 No changes to commit"
            exit 0
          fi
          
          # Коммитим
          git commit -m "📊 Update posted history [skip ci]"
          
          # Пытаемся запушить с тремя попытками
          for i in {1..3}; do
            echo "🔄 Push attempt $i of 3"
            if git push; then
              echo "✅ Successfully pushed on attempt $i"
              exit 0
            else
              echo "⚠️ Push failed, retrying..."
              sleep 5
            fi
          done
          
          echo "❌ Failed to push after 3 attempts"
          exit 1