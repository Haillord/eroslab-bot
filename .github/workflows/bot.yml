name: ErosLab Bot

on:
  schedule:
    - cron: '0 */2 * * *'
    - cron: '10 21 * * *'
  workflow_dispatch:

jobs:
  post:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */2 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ←←← НОВЫЙ ШАГ: Лучшая установка yt-dlp для GitHub Actions
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: true        # автоматически установит ffmpeg + yt-dlp

      - name: Install ffmpeg (fallback)
        if: steps.setup-yt-dlp.outputs.ffmpeg != 'true'
        run: |
          sudo apt-get update --quiet
          sudo apt-get install -y ffmpeg --no-install-recommends

      - name: Run ErosLab Bot (CivitAI)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
          REVIEW_MODE: "false"
          ALLOW_MATURE_FALLBACK: "false"
          ENABLE_VIDEO_QOS: "true"
          MIN_BITRATE_480P: "900"
          MIN_BITRATE_720P: "1400"
          MIN_BITRATE_1080P: "2200"
          R34_API_KEY: ${{ secrets.R34_API_KEY }}
          R34_USER_ID: ${{ secrets.R34_USER_ID }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ENABLE_AI_CAPTION: "true"
          ENABLE_AI_CTA: "true"
          AI_DRY_RUN: "false"
          AI_PROVIDER: "auto"
          AI_TIMEOUT_SEC: "12"
          GROQ_MODEL: "llama-3.3-70b-versatile"
          OPENROUTER_MODEL: "openai/gpt-4o-mini"
          ENABLE_STYLE_BLOCK: "true"
          STYLE_BLOCK_MAX_ITEMS: "3"
          CAPTION_STYLE: "minimal"
          STATS_TZ: "Europe/Moscow"
        run: python civitai_bot.py
        
      - name: Commit and push updates
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Сначала делаем pull, чтобы получить последние изменения
          git pull origin main --no-rebase || true
          
          git add posted_ids.json posted_hashes.json stats.json apt-ffmpeg-version.txt content_state.json pending_draft.json review_state.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "📝 No changes to commit"
            exit 0
          fi
          
          git commit -m "📊 Update posted history [skip ci]"
          
          # Пробуем push с предварительным pull при конфликте
          for i in {1..3}; do
            if git push; then
              echo "✅ Successfully pushed"
              exit 0
            fi
            echo "Push failed, attempting pull and retry..."
            git pull origin main --no-rebase || true
            sleep 5
          done
          
          echo "❌ Failed to push after retries"
          exit 1

  daily-report:
    if: github.event_name == 'schedule' && github.event.schedule == '10 21 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          TELEGRAM_REPORT_CHAT: "@Haillord"
          STATS_TZ: "Europe/Moscow"
        run: python send_daily_report.py

      - name: Commit report state
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --no-rebase || true
          git add stats.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "📝 No report-state changes to commit"
            exit 0
          fi

          git commit -m "📈 Update daily report state [skip ci]"

          for i in {1..3}; do
            if git push; then
              echo "✅ Successfully pushed"
              exit 0
            fi
            echo "Push failed, attempting pull and retry..."
            git pull origin main --no-rebase || true
            sleep 5
          done

          echo "❌ Failed to push after retries"
          exit 1
