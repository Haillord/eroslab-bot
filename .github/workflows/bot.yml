name: ErosLab Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    container: ghcr.io/haillord/eroslab-bot:latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ErosLab Bot (CivitAI)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
          REVIEW_MODE: "false"
          ALLOW_MATURE_FALLBACK: "false"
          ENABLE_VIDEO_QOS: "true"
          MIN_BITRATE_480P: "900"
          MIN_BITRATE_720P: "1400"
          MIN_BITRATE_1080P: "2200"
          R34_API_KEY: ${{ secrets.R34_API_KEY }}
          R34_USER_ID: ${{ secrets.R34_USER_ID }}
          RULE34_MIN_SCORE: "10"
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ENABLE_AI_CAPTION: "true"
          ENABLE_AI_CTA: "true"
          AI_DRY_RUN: "false"
          AI_PROVIDER: "auto"
          AI_TIMEOUT_SEC: "12"
          GROQ_MODEL: "llama-3.3-70b-versatile"
          OPENROUTER_MODEL: "openai/gpt-4o-mini"
          ENABLE_STYLE_BLOCK: "true"
          STYLE_BLOCK_MAX_ITEMS: "3"
          CAPTION_STYLE: "minimal"
          STATS_TZ: "Europe/Moscow"
        run: python civitai_bot.py