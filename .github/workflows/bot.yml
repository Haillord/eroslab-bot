name: ErosLab Bot

on:
  schedule:
    # Оптимизированный график: каждые 2-3 часа в активное время
    - cron: '0 */2 * * *'  # Каждые 3 часа
    # Или если хочешь чаще:
    # - cron: '0 5,8,11,14,17,20,23 * * *'  # В 5,8,11,14,17,20,23 часов
  workflow_dispatch:  # Ручной запуск

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Нужно для пуша обновлений
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Только последний коммит, быстрее
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # Кэшируем зависимости для скорости
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests Pillow python-telegram-bot
          
      - name: Run ErosLab Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
        run: python civitai_bot.py
        
      - name: Commit and push updates
        if: always()  # Всегда пытаемся сохранить историю, даже если были ошибки
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем файлы с историей
          git add posted_ids.json posted_hashes.json stats.json || true
          
          # Коммитим только если есть изменения
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update posted history [skip ci]"
            git push
            echo "History updated successfully"
          fi