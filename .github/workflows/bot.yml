name: ErosLab Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests Pillow python-telegram-bot feedparser
          
      - name: Run ErosLab Bot (CivitAI)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python civitai_bot.py
        
      - name: Run Reddit 3D Parser Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python reddit_parser.py || echo "Reddit parser bot failed, continuing..."
        
      - name: Commit and push updates (with retry)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          for i in {1..3}; do
            echo "🔄 Attempt $i of 3"
            
            git fetch origin main
            git reset --soft origin/main 2>/dev/null || true
            
            git add posted_ids.json posted_hashes.json stats.json reddit_posted.json 2>/dev/null || true
            
            if git diff --cached --quiet; then
              echo "📝 No changes to commit"
              exit 0
            fi
            
            git commit -m "📊 Update posted history [skip ci]"
            
            if git push; then
              echo "✅ Successfully pushed on attempt $i"
              exit 0
            else
              echo "⚠️ Push failed, retrying..."
              sleep 5
            fi
          done
          
          echo "❌ Failed to push after 3 attempts"
          exit 1