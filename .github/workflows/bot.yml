name: ErosLab Bot

on:
  schedule:
    - cron: '0 10,12,14,16,18,20,22 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install --upgrade pip
          pip install requests Pillow python-telegram-bot

      - run: python civitai_bot.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git pull --rebase || true
          git add posted_ids.json posted_hashes.json stats.json || true
          git commit -m "update stats" || true
          git push || true
