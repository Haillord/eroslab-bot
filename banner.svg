      <circle cx="40"  cy="320" r="1.5"/><circle cx="80"  cy="320" r="1.5"/><circle cx="120" cy="320" r="1.5"/><circle cx="160" cy="320" r="1.5"/><circle cx="200" cy="320" r="1.5"/><circle cx="240" cy="320" r="1.5"/><circle cx="280" cy="320" r="1.5"/><circle cx="320" cy="320" r="1.5"/>
      <circle cx="880" cy="320" r="1.5"/><circle cx="920" cy="320" r="1.5"/><circle cx="960" cy="320" r="1.5"/><circle cx="1000" cy="320" r="1.5"/><circle cx="1040" cy="320" r="1.5"/><circle cx="1080" cy="320" r="1.5"/><circle cx="1120" cy="320" r="1.5"/><circle cx="1160" cy="320" r="1.5"/>
      <circle cx="40"  cy="360" r="1.5"/><circle cx="80"  cy="360" r="1.5"/><circle cx="120" cy="360" r="1.5"/><circle cx="160" cy="360" r="1.5"/><circle cx="200" cy="360" r="1.5"/><circle cx="240" cy="360" r="1.5"/><circle cx="280" cy="360" r="1.5"/>
      <circle cx="880" cy="360" r="1.5"/><circle cx="920" cy="360" r="1.5"/><circle cx="960" cy="360" r="1.5"/><circle cx="1000" cy="360" r="1.5"/><circle cx="1040" cy="360" r="1.5"/><circle cx="1080" cy="360" r="1.5"/><circle cx="1120" cy="360" r="1.5"/><circle cx="1160" cy="360" r="1.5"/>
    </g>
