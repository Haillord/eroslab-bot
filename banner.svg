<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="50%" stop-color="#090812"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CC1133"/>
      <stop offset="40%" stop-color="#FF2244"/>
      <stop offset="100%" stop-color="#FF4466"/>
    </linearGradient>
    <linearGradient id="lineLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2244" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FF2244" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="lineRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2244" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF2244" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rbloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF2244" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF2244" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Фон — вне анимированной группы -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Вся остальная графика обёрнута в один <g> с анимациями -->
  <g>
    <!-- Эффект дыхания: масштаб 0.996 → 1.004 относительно центра, 7.2s -->
    <animateTransform attributeName="transform" type="scale"
      values="1;0.996;1;1.004;1"
      keyTimes="0;0.25;0.5;0.75;1"
      calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
      dur="7.2s" repeatCount="indefinite" additive="sum"
      transform-origin="600 200"/>
    <!-- Микро дрожь по X: ±1.2px, 3.7s -->
    <animateTransform attributeName="transform" type="translate"
      values="0,0;1.2,0;0,0;-1.2,0;0,0"
      keyTimes="0;0.25;0.5;0.75;1"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
      dur="3.7s" repeatCount="indefinite" additive="sum"/>
    <!-- Микро дрожь по Y: ±1.2px, 5.3s (другая фаза) -->
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,1.2;0,0;0,-1.2;0,0"
      keyTimes="0;0.25;0.5;0.75;1"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
      dur="5.3s" repeatCount="indefinite" additive="sum" begin="1.8s"/>
    <!-- Пульсация непрозрачности: 0.985 → 1.0, 11s -->
    <animate attributeName="opacity"
      values="1;0.985;1;0.992;1"
      keyTimes="0;0.3;0.5;0.8;1"
      calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
      dur="11s" repeatCount="indefinite"/>

    <ellipse cx="600" cy="200" rx="380" ry="200" fill="url(#rbloom)"/>
    <text x="600" y="190" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="104" font-weight="700" letter-spacing="-2" fill="#FF2244" opacity="0.05">ErosLab</text>
    <text x="600" y="190" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="100" font-weight="700" letter-spacing="-2" fill="#FF2244" opacity="0.07">ErosLab</text>
    <text x="600" y="190" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="96"  font-weight="700" letter-spacing="-2" fill="#FF2244" opacity="0.08">ErosLab</text>
