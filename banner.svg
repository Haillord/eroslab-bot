    <line x1="0" y1="398" x2="1200" y2="398" stroke="#FF2244" stroke-width="2" opacity="0.5"/>
    <polyline points="0,0 60,0 60,4"         fill="none" stroke="#FF2244" stroke-width="2" opacity="0.9"/>
    <polyline points="0,0 0,60 4,60"         fill="none" stroke="#FF2244" stroke-width="2" opacity="0.9"/>
    <polyline points="1200,0 1140,0 1140,4"  fill="none" stroke="#FF2244" stroke-width="2" opacity="0.9"/>
