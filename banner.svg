      <circle cx="40"  cy="80"  r="1.5"/><circle cx="80"  cy="80"  r="1.5"/><circle cx="120" cy="80"  r="1.5"/><circle cx="160" cy="80"  r="1.5"/><circle cx="200" cy="80"  r="1.5"/><circle cx="240" cy="80"  r="1.5"/><circle cx="280" cy="80"  r="1.5"/><circle cx="320" cy="80"  r="1.5"/>
      <circle cx="880" cy="80"  r="1.5"/><circle cx="920" cy="80"  r="1.5"/><circle cx="960" cy="80"  r="1.5"/><circle cx="1000" cy="80" r="1.5"/><circle cx="1040" cy="80" r="1.5"/><circle cx="1080" cy="80" r="1.5"/><circle cx="1120" cy="80" r="1.5"/><circle cx="1160" cy="80" r="1.5"/>
