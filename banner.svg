      <line x1="-10" y1="-8" x2="10" y2="-8" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="-38" x2="0" y2="-50" stroke-width="1.5"/>
      <circle cx="0" cy="-54" r="4" stroke-width="1.5"/>
      <rect x="-36" y="-22" width="8"  height="18" rx="3" stroke-width="1"/>
      <rect x="28"  y="-22" width="8"  height="18" rx="3" stroke-width="1"/>
      <rect x="-20" y="6"   width="14" height="24" rx="3" stroke-width="1"/>
      <rect x="6"   y="6"   width="14" height="24" rx="3" stroke-width="1"/>
    </g>
    <g transform="translate(1070,200)" opacity="0.32" stroke="#FF2244" fill="none">
      <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" stroke-width="1.5"/>
      <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" stroke-width="1" opacity="0.5"/>
